<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(135deg, #ec4899, #9333ea, #06b6d4);
      background-size: 400% 400%;
      animation: gradientAnimation 15s ease infinite;

      display: grid;
      grid-template-rows: 1fr;
      grid-template-columns: 280px 1fr;
      grid-template-areas: "sidebar main";
      height: 100vh;
      overflow: hidden;
    }

    /* Noise texture overlay */
    html::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      opacity: 0.05;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes gradientAnimation {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ─── Logo area at top of sidebar ───────────────────────────────────── */
    .sidebar-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 20px;
    }

    .logo-img {
      width: 100%;
      max-width: 248px;
      height: auto;
      object-fit: contain;
      border-radius: 8px;
    }

    /* Spacer that pushes nav to vertical center */
    .nav-spacer {
      display: none;
    }

    /* ─── Sidebar ─────────────────────────────────────────────────────────── */
    .sidebar {
      grid-area: sidebar;
      backdrop-filter: blur(4px);
      background-color: rgba(0, 0, 0, 0.35);
      border-right: 1px solid rgba(255, 255, 255, 0.2);
      padding: 0;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      position: relative;
    }

    /* Nav menu: top anchored so the title sits just above the vertical center */
    .nav-menu {
      position: absolute;
      top: calc(50% - 90px); /* adjusted for title + buttons */
      width: 100%;
      padding: 0;
    }

    /* ─── Nav section title (COMMUNITY style) ───────────────────────────── */
    .nav-title {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      margin-bottom: 12px;
    }

    .nav-title-line {
      flex: 1;
      height: 3px;
      background: rgba(255, 255, 255, 0.35);
    }

    .nav-title-text {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.75);
      white-space: nowrap;
    }

    /* ─── Nav items ───────────────────────────────────────────────────────── */
    .nav-item {
      margin-bottom: 1px;
    }

    .nav-toggle {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
      pointer-events: none;
    }

    /* Main menu button */
    .nav-summary {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 16px;
      background: rgba(0, 0, 0, 0.6);
      color: white;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 1.05rem;
      cursor: pointer;
      user-select: none;
      transition: background-color 0.25s ease;
      position: relative;
      border-left: 3px solid #f97316;
    }

    /* Icon: small square like the game uses */
    .nav-icon {
      width: 32px;
      height: 32px;
      border-radius: 4px;
      flex-shrink: 0;
      object-fit: contain;
      opacity: 0.85;
    }

    .nav-label-text {
      flex: 1;
    }

    .nav-summary:hover {
      background-color: rgba(0, 0, 0, 0.75);
    }

    /* Arrow indicator */
    .nav-arrow {
      display: inline-block;
      font-style: normal;
      font-size: 0.7rem;
      opacity: 0.7;
      transition: transform 0.3s ease;
      flex-shrink: 0;
    }

    .nav-toggle:checked ~ .nav-summary .nav-arrow {
      transform: rotate(180deg);
    }

    /* Active/open state */
    .nav-toggle:checked ~ .nav-summary {
      background-color: rgba(0, 0, 0, 0.75);
      font-weight: 600;
    }

    /* ── Submenu animation ──────────────────────────────────────────────── */
    @keyframes slideDown {
      from { max-height: 0;     opacity: 0; transform: translateY(-6px); }
      to   { max-height: 300px; opacity: 1; transform: translateY(0);    }
    }

    @keyframes slideUp {
      from { max-height: 300px; opacity: 1; transform: translateY(0);    }
      to   { max-height: 0;     opacity: 0; transform: translateY(-6px); }
    }

    .nav-sub {
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      animation: slideUp 0.3s ease forwards;
    }

    .nav-sub-inner {
      padding-bottom: 4px;
    }

    .nav-toggle:checked ~ .nav-sub {
      animation: slideDown 0.35s ease forwards;
    }

    /* ── Radio state for active sub-items ───────────────────────────────── */
    .nav-radio {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
      pointer-events: none;
    }

    .nav-sub-label {
      display: block;
      padding: 9px 16px 9px 32px;
      margin: 2px 0;
      border-radius: 0.3rem;
      color: rgba(255, 255, 255, 0.75);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.82rem;
      font-weight: 400;
      cursor: pointer;
      transition: background-color 0.2s ease, color 0.2s ease;
      position: relative;
      text-decoration: none;
    }

    .nav-sub-label::before {
      content: "·";
      position: absolute;
      left: 18px;
      opacity: 0.5;
    }

    .nav-sub-label:hover {
      background-color: rgba(255, 255, 255, 0.1);
      color: white;
    }

    .nav-radio:checked + .nav-sub-label,
    .nav-sub-label.nav-sub-active {
      background-color: rgba(255, 255, 255, 0.22);
      color: white;
      font-weight: 600;
    }

    .nav-radio:checked + .nav-sub-label::before,
    .nav-sub-label.nav-sub-active::before {
      opacity: 1;
    }

    /* ─── Contenido principal ─────────────────────────────────────────────── */
    .main-content {
      grid-area: main;
      overflow: hidden;
    }

    .main-content iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ─── Scrollbar styling for sidebar ─────────────────────────────────── */
    .sidebar::-webkit-scrollbar {
      width: 3px;
    }
    .sidebar::-webkit-scrollbar-track {
      background: transparent;
    }
    .sidebar::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
    }

    /* ─── Responsive ──────────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      body {
        grid-template-rows: 1fr 64px;
        grid-template-columns: 1fr;
        grid-template-areas:
          "main"
          "sidebar";
      }

      .sidebar {
        flex-direction: row;
        border-right: none;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        padding: 8px;
        overflow-x: auto;
        overflow-y: hidden;
      }
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar" aria-label="Navegación principal">

    <!-- Logo at top -->
    <div class="sidebar-logo">
      <a href="index.html"><img class="logo-img" src="./assets/logo-big.png" alt="Logo"></a>
    </div>

    <div class="nav-spacer"></div>

    <div class="nav-menu">

    <!-- Section title -->
    <div class="nav-title">
      <span class="nav-title-line"></span>
      <span class="nav-title-text">Compendium</span>
      <span class="nav-title-line"></span>
    </div>

    <!-- Blueprints -->
    <div class="nav-item">
      <input class="nav-toggle" type="checkbox" id="toggle-1">
      <label class="nav-summary" for="toggle-1">
        <img class="nav-icon" src="./assets/module-icon.png" alt="Blueprints icon">
        <span class="nav-label-text">Blueprints</span>
        <i class="nav-arrow">▼</i>
      </label>
      <div class="nav-sub">
        <div class="nav-sub-inner">
          <input class="nav-radio" type="radio" name="nav" id="nav-1-1">
          <a href="ch-easy.html" target="content-frame" class="nav-sub-label">Challenges Easymode</a>
          <input class="nav-radio" type="radio" name="nav" id="nav-1-2">
          <a href="ch-hard.html" target="content-frame" class="nav-sub-label">Challenges Hardmode</a>
          <input class="nav-radio" type="radio" name="nav" id="nav-1-3">
          <label class="nav-sub-label" for="nav-1-3">Other BPs</label>
        </div>
      </div>
    </div>

    <!-- Analytics -->
    <div class="nav-item">
      <input class="nav-toggle" type="checkbox" id="toggle-2">
      <label class="nav-summary" for="toggle-2">
        <img class="nav-icon" src="https://placehold.co/32x32/1a1a1a/f97316?text=A" alt="Analytics icon">
        <span class="nav-label-text">AI Scripts</span>
        <i class="nav-arrow">▼</i>
      </label>
      <div class="nav-sub">
        <div class="nav-sub-inner">
          <input class="nav-radio" type="radio" name="nav" id="nav-2-1">
          <label class="nav-sub-label" for="nav-2-1">Métricas</label>
          <input class="nav-radio" type="radio" name="nav" id="nav-2-2">
          <label class="nav-sub-label" for="nav-2-2">Reportes</label>
          <input class="nav-radio" type="radio" name="nav" id="nav-2-3">
          <label class="nav-sub-label" for="nav-2-3">Exportar datos</label>
        </div>
      </div>
    </div>

    <!-- Settings -->
    <div class="nav-item">
      <input class="nav-toggle" type="checkbox" id="toggle-3">
      <label class="nav-summary" for="toggle-3">
        <img class="nav-icon" src="https://placehold.co/32x32/1a1a1a/f97316?text=S" alt="Settings icon">
        <span class="nav-label-text">Settings</span>
        <i class="nav-arrow">▼</i>
      </label>
      <div class="nav-sub">
        <div class="nav-sub-inner">
          <input class="nav-radio" type="radio" name="nav" id="nav-3-1">
          <label class="nav-sub-label" for="nav-3-1">Perfil</label>
          <input class="nav-radio" type="radio" name="nav" id="nav-3-2">
          <label class="nav-sub-label" for="nav-3-2">Seguridad</label>
          <input class="nav-radio" type="radio" name="nav" id="nav-3-3">
          <label class="nav-sub-label" for="nav-3-3">Preferencias</label>
        </div>
      </div>
    </div>

    </div>

  </aside>

  <!-- Main -->
  <main class="main-content">
    <iframe name="content-frame" src="welcome.html"></iframe>
  </main>

  <script>
    document.querySelectorAll('.nav-sub-label').forEach(label => {
      label.addEventListener('click', () => {
        document.querySelectorAll('.nav-sub-label').forEach(l => l.classList.remove('nav-sub-active'));
        label.classList.add('nav-sub-active');
      });
    });
  </script>


</body>
</html>

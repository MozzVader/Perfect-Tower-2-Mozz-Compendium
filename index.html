<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* ─── Layout raíz con CSS Grid ──────────────────────────────────────────
       Se define un grid de 2 columnas × 2 filas:
         - Fila 1 (header): ocupa ambas columnas
         - Fila 2: columna 1 → sidebar | columna 2 → contenido principal
       Ventajas frente al enfoque anterior:
         · Sin position: fixed/absolute en el header/sidebar
         · Sin z-index frágiles entre capas de stacking context distintos
         · El browser maneja el apilamiento de forma predecible
         · overflow: hidden ya no es necesario en body
    ──────────────────────────────────────────────────────────────────────── */
    html, body {
      height: 100%;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(135deg, #ec4899, #9333ea, #06b6d4);
      background-size: 400% 400%;
      animation: gradientAnimation 15s ease infinite;

      /* Grid principal: header arriba, sidebar + main abajo */
      display: grid;
      grid-template-rows: 96px 1fr;   /* header fijo en altura, resto flexible */
      grid-template-columns: 208px 1fr; /* sidebar fijo en ancho, resto flexible */
      grid-template-areas:
        "header  header"
        "sidebar main";
      height: 100vh;
      overflow: hidden; /* sólo aquí para evitar scroll en el viewport */
    }

    /* Efecto de ruido como pseudo-elemento en html para no interferir con el grid */
    html::before {
      content: "";
      position: fixed; /* fixed sobre html es seguro y no crea z-index wars */
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      opacity: 0.05;
      pointer-events: none;
      z-index: 0; /* debajo de todo el contenido */
    }

    @keyframes gradientAnimation {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .neon-text {
      text-shadow:
        0 0 5px  rgba(255, 255, 255, 0.5),
        0 0 10px rgba(255, 255, 255, 0.3),
        0 0 15px rgba(255, 255, 255, 0.2);
    }

    /* ─── Header ──────────────────────────────────────────────────────────── */
    .header {
      grid-area: header;
      display: flex;
      align-items: center;
      padding: 0 24px;
      backdrop-filter: blur(4px);
      background-color: rgba(0, 0, 0, 0.2);
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      /* z-index sólo necesario si se superpone algo encima; aquí es innecesario */
    }

    .logo-img {
      width: 64px;
      height: 64px;
      object-fit: contain;
      border-radius: 0.75rem;
      margin-right: 16px;
      flex-shrink: 0;
    }

    .header-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: white;
    }

    /* ─── Sidebar ─────────────────────────────────────────────────────────── */
    .sidebar {
      grid-area: sidebar;
      backdrop-filter: blur(4px);
      background-color: rgba(0, 0, 0, 0.2);
      border-right: 1px solid rgba(255, 255, 255, 0.2);
      padding: 16px;
      display: flex;
      flex-direction: column;
      overflow-y: auto; /* scroll interno si el contenido del sidebar crece */
    }

    /* ─── Menú desplegable CSS-only con checkboxes ───────────────────────────
       Por qué no <details>:
         <details> usa display:none en el contenido cerrado → el elemento
         no existe en el flujo visual → las transiciones CSS nunca se
         ejecutan porque no hay nada que animar.

       Solución: checkbox oculto + label como botón.
         · El contenido (.nav-sub) SIEMPRE está en el DOM
         · Cuando el checkbox está :checked, se expande con transición real
         · Un segundo grupo de radio inputs maneja el ítem activo
    ──────────────────────────────────────────────────────────────────────── */

    .nav-item {
      margin-bottom: 4px;
    }

    /* Checkbox toggle — oculto visualmente, siempre en el DOM */
    .nav-toggle {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
      pointer-events: none;
    }

    /* Label = botón principal del menú */
    .nav-summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      width: 100%;
      padding: 12px 16px;
      border-radius: 0.375rem;
      background: transparent;
      color: white;
      font-family: 'Montserrat', sans-serif;
      font-weight: 500;
      font-size: 0.95rem;
      cursor: pointer;
      user-select: none;
      transition: background-color 0.25s ease;
    }

    .nav-summary:hover {
      background-color: rgba(255, 255, 255, 0.15);
    }

    /* Flecha: rota cuando el checkbox está checked */
    .nav-arrow {
      display: inline-block;
      font-style: normal;
      font-size: 0.7rem;
      opacity: 0.7;
      transition: transform 0.3s ease;
      flex-shrink: 0;
    }

    .nav-toggle:checked ~ .nav-summary .nav-arrow {
      transform: rotate(180deg);
    }

    /* Highlight del label cuando está abierto */
    .nav-toggle:checked ~ .nav-summary {
      background-color: rgba(255, 255, 255, 0.15);
      font-weight: 600;
    }

    /* ── Submenú: animado con @keyframes ─────────────────────────────────── */

    @keyframes slideDown {
      from { max-height: 0;     opacity: 0; transform: translateY(-6px); }
      to   { max-height: 200px; opacity: 1; transform: translateY(0);    }
    }

    @keyframes slideUp {
      from { max-height: 200px; opacity: 1; transform: translateY(0);    }
      to   { max-height: 0;     opacity: 0; transform: translateY(-6px); }
    }

    .nav-sub {
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      animation: slideUp 0.3s ease forwards;
    }

    .nav-sub-inner {
      padding-bottom: 4px;
    }

    .nav-toggle:checked ~ .nav-sub {
      animation: slideDown 0.35s ease forwards;
    }

    /* ── Radio inputs para estado activo ─────────────────────────────────── */
    .nav-radio {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
      pointer-events: none;
    }

    .nav-sub-label {
      display: block;
      padding: 9px 16px 9px 32px;
      margin: 2px 0;
      border-radius: 0.3rem;
      color: rgba(255, 255, 255, 0.75);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.82rem;
      font-weight: 400;
      cursor: pointer;
      transition: background-color 0.2s ease, color 0.2s ease;
      position: relative;
    }

    .nav-sub-label::before {
      content: "·";
      position: absolute;
      left: 18px;
      opacity: 0.5;
    }

    .nav-sub-label:hover {
      background-color: rgba(255, 255, 255, 0.1);
      color: white;
    }

    .nav-radio:checked + .nav-sub-label {
      background-color: rgba(255, 255, 255, 0.22);
      color: white;
      font-weight: 600;
    }

    .nav-radio:checked + .nav-sub-label::before {
      opacity: 1;
    }

    /* ─── Contenido principal ─────────────────────────────────────────────── */
    .main-content {
      grid-area: main;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-y: auto; /* scroll interno si el contenido crece */
      padding: 24px;
    }

    .content-card {
      text-align: center;
      padding: 32px;
      background-color: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 1rem;
      max-width: 600px;
      width: 100%;
    }

    .content-title {
      font-size: 2.25rem;
      font-weight: 700;
      color: white;
      margin-bottom: 16px;
    }

    .content-text {
      color: rgba(255, 255, 255, 0.8);
      font-size: 1.125rem;
      line-height: 1.75rem;
      max-width: 500px;
      margin: 0 auto;
    }

    /* ─── Responsive ──────────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      body {
        /* En móvil: header arriba, main en el medio, sidebar como barra inferior */
        grid-template-rows: 96px 1fr 64px;
        grid-template-columns: 1fr;
        grid-template-areas:
          "header"
          "main"
          "sidebar";
      }

      .sidebar {
        flex-direction: row;
        border-right: none;
        border-top: 1px solid rgba(255, 255, 255, 0.2);
        padding: 8px;
        overflow-x: auto;
        overflow-y: hidden;
      }

      .sidebar-button {
        margin-bottom: 0;
        margin-right: 8px;
        padding: 8px 12px;
        font-size: 0.875rem;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .content-title  { font-size: 1.5rem; }
      .content-text   { font-size: 1rem; }
    }
  </style>
</head>
<body>

  <!-- Header: grid-area "header" -->
  <header class="header">
    <img class="logo-img" src="./Assets/header-logo.png" alt="Logo">
    <h1 class="header-title neon-text">Neon Dashboard</h1>
  </header>

  <!-- Sidebar: grid-area "sidebar" -->
  <!-- 
    Menú 100% CSS-only:
    · <details> + <summary> manejan open/close sin JS
    · Radio inputs ocultos manejan el ítem activo sin JS
    · Todos en el mismo name="nav" para que solo uno esté activo a la vez
  -->
  <aside class="sidebar" aria-label="Navegación principal">

    <!-- Dashboard -->
    <div class="nav-item">
      <input class="nav-toggle" type="checkbox" id="toggle-1">
      <label class="nav-summary" for="toggle-1">
        Dashboard
        <i class="nav-arrow">▼</i>
      </label>
      <div class="nav-sub">
        <div class="nav-sub-inner">
          <input class="nav-radio" type="radio" name="nav" id="nav-1-1">
          <a href="Ricky.html" style="text-decoration:none;">
          <label class="nav-sub-label" for="nav-1-1">Resumen</label>
          </a>
          <input class="nav-radio" type="radio" name="nav" id="nav-1-2">
          <label class="nav-sub-label" for="nav-1-2">Actividad reciente</label>
          <input class="nav-radio" type="radio" name="nav" id="nav-1-3">
          <label class="nav-sub-label" for="nav-1-3">Notificaciones</label>
        </div>
      </div>
    </div>

    <!-- Analytics -->
    <div class="nav-item">
      <input class="nav-toggle" type="checkbox" id="toggle-2">
      <label class="nav-summary" for="toggle-2">
        Analytics
        <i class="nav-arrow">▼</i>
      </label>
      <div class="nav-sub">
        <div class="nav-sub-inner">
          <input class="nav-radio" type="radio" name="nav" id="nav-2-1">
          <label class="nav-sub-label" for="nav-2-1">Métricas</label>
          <input class="nav-radio" type="radio" name="nav" id="nav-2-2">
          <label class="nav-sub-label" for="nav-2-2">Reportes</label>
          <input class="nav-radio" type="radio" name="nav" id="nav-2-3">
          <label class="nav-sub-label" for="nav-2-3">Exportar datos</label>
        </div>
      </div>
    </div>

    <!-- Settings -->
    <div class="nav-item">
      <input class="nav-toggle" type="checkbox" id="toggle-3">
      <label class="nav-summary" for="toggle-3">
        Settings
        <i class="nav-arrow">▼</i>
      </label>
      <div class="nav-sub">
        <div class="nav-sub-inner">
          <input class="nav-radio" type="radio" name="nav" id="nav-3-1">
          <label class="nav-sub-label" for="nav-3-1">Perfil</label>
          <input class="nav-radio" type="radio" name="nav" id="nav-3-2">
          <label class="nav-sub-label" for="nav-3-2">Seguridad</label>
          <input class="nav-radio" type="radio" name="nav" id="nav-3-3">
          <label class="nav-sub-label" for="nav-3-3">Preferencias</label>
        </div>
      </div>
    </div>

  </aside>

  <!-- Main: grid-area "main" -->
  <main class="main-content">
    <div class="content-card">
      <h2 class="content-title neon-text">Bienvenido al Dashboard</h2>
      <p class="content-text">
        Este es el área principal de contenido. La barra de menú está posicionada debajo del encabezado.
      </p>
    </div>
  </main>

</body>
</html>
